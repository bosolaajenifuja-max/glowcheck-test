<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowCheck</title>
    <style>
      body { background: #000; color: #fff; font-family: system-ui; }
      .loading { padding: 20px; text-align: center; }
      .error { color: red; padding: 20px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <p>Loading GlowCheck...</p>
        <p id="debug"></p>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('root').innerHTML = '<div class="error"><h3>Error</h3><p>' + msg + '</p><p>Line: ' + line + '</p></div>';
      };
      document.getElementById('debug').textContent = 'JS running at ' + new Date().toISOString();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
